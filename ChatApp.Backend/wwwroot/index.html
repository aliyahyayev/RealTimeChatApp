<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Style .NET Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #dadbd4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Əsas Konteyner (WhatsApp tipli ekran) */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            background-color: #f0f2f5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 900px) {
            .app-container {
                width: 80%;
                height: 90vh;
                border-radius: 10px;
            }
        }

        /* Sol Panel - Çat siyahısı */
        .sidebar {
            width: 100%;
            height: 100%;
            background: white;
            border-right: 1px solid #e3e3e3;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 2;
        }

        @media (min-width: 900px) {
            .sidebar {
                width: 30%;
                min-width: 280px;
                transform: none !important;
            }
        }

        .sidebar-header {
            padding: 15px;
            background: #f0f2f5;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #e3e3e3;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: #ea0038;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

            .chat-item:hover {
                background: #f5f6f6;
            }

        .avatar {
            width: 40px;
            height: 40px;
            background: #00a884;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* Sağ Panel - Söhbət ekranı */
        .main-chat {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #efeae2;
            position: absolute;
            left: 100%;
            transition: left 0.3s ease;
            z-index: 3;
        }

        @media (min-width: 900px) {
            .main-chat {
                position: static;
                flex: 1;
                left: auto;
            }
        }

        /* Mobil üçün Sağa-Sola sürüşmə tetikləyicisi */
        .app-container.show-chat .sidebar {
            transform: translateX(-100%);
        }

        .app-container.show-chat .main-chat {
            left: 0;
        }

        .chat-header {
            padding: 15px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid #e3e3e3;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: block;
            padding-right: 10px;
        }

        @media (min-width: 900px) {
            .back-btn {
                display: none;
            }
        }

        .clear-btn {
            background: none;
            border: none;
            color: #667781;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 4px;
        }

            .clear-btn:hover {
                background: rgba(0,0,0,0.05);
                color: #ea0038;
            }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Mesaj Balonları */
        .msg {
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 65%;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

            .msg.sent {
                background: #d9fdd3;
                align-self: flex-end;
            }

            .msg.received {
                background: white;
                align-self: flex-start;
            }

        /* Giriş Paneli */
        .input-area {
            padding: 10px;
            background: #f0f2f5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

            .input-area input {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 6px;
                outline: none;
                font-size: 14px;
            }

            .input-area button {
                padding: 12px 20px;
                background: #00a884;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }

        /* Giriş/Qeydiyyat Modal ekranı */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .auth-box {
            background: #222e35;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            color: #e9edef;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

            .auth-box input {
                padding: 12px;
                border: none;
                border-radius: 6px;
                background: #2a3942;
                color: white;
                outline: none;
            }

            .auth-box button {
                padding: 12px;
                background: #00a884;
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: bold;
                cursor: pointer;
            }
    </style>
</head>
<body>

    <!-- Giriş Bölməsi -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2>Chat Giriş</h2>
            <p style="font-size: 12px; color: #8696a0;">Ad və Giriş Kodu (Şifrə) təyin edin</p>
            <input type="text" id="usernameInput" placeholder="İstifadəçi adı...">
            <input type="password" id="passwordInput" placeholder="Giriş Kodu (Şifrə)...">
            <button onclick="loginOrRegister()">Daxil Ol</button>
        </div>
    </div>

    <!-- Əsas İnterfeys -->
    <div class="app-container" id="appMain" style="display: none;">
        <!-- Sol Tərəf: Siyahı -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span id="myProfileHeader">Çatlar</span>
                <button class="logout-btn" onclick="logout()">Çıxış ↩</button>
            </div>
            <div class="chat-list" id="activeChatsList">
                <div class="chat-item" onclick="switchToGlobalRoom()">
                    <div class="avatar" style="background: #007bff;">G</div>
                    <div><b>Ümumi Otaq</b></div>
                </div>
            </div>
        </div>

        <!-- Sağ Tərəf: Mesajlaşma -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="document.getElementById('appMain').classList.remove('show-chat')">⬅</button>
                    <span id="currentChatTitle">Ümumi Otaq</span>
                </div>
                <button class="clear-btn" onclick="clearChatHistory()">Təmizlə 🗑️</button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Mesaj yazın..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Göndər</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://realtimechatapp-production-1e1f.up.railway.app";
        let connection = null;
        let currentUser = null;
        let activeRoomId = "global";

        async function loginOrRegister() {
            const username = document.getElementById("usernameInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            if (!username || !password) return alert("Bütün xanaları doldurun!");

            try {
                const res = await fetch(`${BASE_URL}/api/users/login-or-register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (!res.ok) return alert("Xəta: " + await res.text());

                currentUser = await res.json();

                document.getElementById("authOverlay").style.display = "none";
                document.getElementById("appMain").style.display = "flex";
                document.getElementById("myProfileHeader").innerText = currentUser.username;

                initSignalR();
                loadUsersList();
                loadChatHistory("global"); // İlk daxil olanda global mesajları gətirsin
            } catch (e) {
                alert("Server bağlantı xətası!");
            }
        }

        async function loadUsersList() {
            const res = await fetch(`${BASE_URL}/api/users/all`);
            const users = await res.json();
            const listHtml = document.getElementById("activeChatsList");

            // Əvvəlki siyahını təmizləyək (Ümumi otaq xaric)
            listHtml.innerHTML = `
                    <div class="chat-item" onclick="switchToGlobalRoom()">
                        <div class="avatar" style="background: #007bff;">G</div>
                        <div><b>Ümumi Otaq</b></div>
                    </div>`;

            users.forEach(user => {
                if (user.id !== currentUser.id) {
                    listHtml.innerHTML += `
                            <div class="chat-item" onclick="startPrivateChat('${user.id}', '${user.username}')">
                                <div class="avatar">${user.username[0].toUpperCase()}</div>
                                <div><b>${user.username}</b></div>
                            </div>`;
                }
            });
        }

        function startPrivateChat(targetUserId, targetUsername) {
            const myId = Number(currentUser.id);
            const theirId = Number(targetUserId);

            activeRoomId = myId < theirId ? `${myId}_${theirId}` : `${theird}_${myId}`;

            document.getElementById("currentChatTitle").innerText = targetUsername;
            document.getElementById("messagesArea").innerHTML = "";

            loadChatHistory(activeRoomId);

            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                connection.invoke("JoinRoom", activeRoomId);
            }

            // Mobil üçün ekranı çata sürüşdürür
            document.getElementById("appMain").classList.add("show-chat");
        }

        function switchToGlobalRoom() {
            activeRoomId = "global";
            document.getElementById("currentChatTitle").innerText = "Ümumi Otaq";
            document.getElementById("messagesArea").innerHTML = "";

            loadChatHistory("global");

            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                connection.invoke("JoinRoom", "global");
            }

            // Mobil üçün ekranı çata sürüşdürür
            document.getElementById("appMain").classList.add("show-chat");
        }

        function initSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl(BASE_URL + "/chatHub")
                .withAutomaticReconnect()
                .build();

            connection.on("ReceivePrivateMessage", function (senderName, message, roomId) {
                if (roomId === activeRoomId) {
                    appendMessage(senderName, message);
                }
            });

            // Arxa fondan tarixi təmizlə siqnalı gələndə ekranı da təmizləsin
            connection.on("ChatHistoryCleared", function (roomId) {
                if (roomId === activeRoomId) {
                    document.getElementById("messagesArea").innerHTML = "";
                }
            });

            connection.start().then(() => {
                connection.invoke("JoinRoom", activeRoomId);
            });
        }

        async function loadChatHistory(roomId) {
            try {
                const res = await fetch(`${BASE_URL}/api/users/messages/${roomId}`);
                if (!res.ok) return;
                const messages = await res.json();
                document.getElementById("messagesArea").innerHTML = ""; // dublikat olmasın deyə
                messages.forEach(msg => appendMessage(msg.senderUsername, msg.content));
            } catch (error) {
                console.error("Tarixçə yüklənərkən xəta:", error);
            }
        }

        function appendMessage(sender, text) {
            const area = document.getElementById("messagesArea");
            const div = document.createElement("div");
            div.className = "msg " + (sender === currentUser.username ? "sent" : "received");
            div.innerHTML = `<strong>${sender}:</strong> <br> ${text}`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text || !connection) return;

            try {
                await connection.invoke("SendPrivateMessage", activeRoomId, Number(currentUser.id), text);
                input.value = "";
            } catch (e) {
                console.error("Mesaj göndərilərkən xəta:", e);
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Çat Tarixçəsini Silmək üçün Funksiya
        async function clearChatHistory() {
            if (!confirm("Bu otaqdakı bütün mesajları silmək istədiyinizə əminsiniz?")) return;

            try {
                // Backend-də silmə API-sini tetikləyirik
                const res = await fetch(`${BASE_URL}/api/users/messages/clear/${activeRoomId}`, {
                    method: "DELETE"
                });

                if (res.ok) {
                    document.getElementById("messagesArea").innerHTML = "";
                    alert("Çat tarixçəsi uğurla silindi!");
                } else {
                    alert("Silinmə zamanı xəta baş verdi.");
                }
            } catch (e) {
                console.error("Silmə xətası:", e);
            }
        }

        // Çıxış Funksiyası (Logout)
        function logout() {
            if (connection) {
                connection.stop();
            }
            currentUser = null;
            activeRoomId = "global";
            document.getElementById("usernameInput").value = "";
            document.getElementById("passwordInput").value = "";
            document.getElementById("messagesArea").innerHTML = "";

            // Ekranları sıfırla
            document.getElementById("appMain").classList.remove("show-chat");
            document.getElementById("appMain").style.display = "none";
            document.getElementById("authOverlay").style.display = "flex";
        }
    </script>
</body>
</html>
