<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Style .NET Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0c1317;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: #111b21;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 900px) {
            .app-container {
                width: 85%;
                height: 92vh;
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        /* --- SOL TƏRƏF: Siyahı Paneli --- */
        .sidebar {
            width: 100%;
            height: 100%;
            background: #111b21;
            border-right: 1px solid #222e35;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease-in-out;
            z-index: 2;
            position: absolute;
            left: 0;
            top: 0;
        }

        @media (min-width: 900px) {
            .sidebar {
                width: 30%;
                min-width: 300px;
                position: static;
                transform: none !important;
            }
        }

        .sidebar-header {
            padding: 15px 20px;
            background: #202c33;
            font-weight: 600;
            font-size: 18px;
            color: #e9edef;
            border-bottom: 1px solid #222e35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
        }

        .logout-btn {
            background: #ea0038;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

            .logout-btn:hover {
                background: #c2002f;
            }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px 20px;
            border-bottom: 1px solid #1c272e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #e9edef;
            transition: 0.2s;
        }

            .chat-item:hover {
                background: #202c33;
            }

        .avatar {
            width: 45px;
            height: 45px;
            background: #00a884;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .unread-badge {
            background-color: #00a884;
            color: #111b21;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
            margin-left: auto;
            display: none;
        }

        /* --- SAĞ TƏRƏF: Mesajlaşma Paneli --- */
        .main-chat {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0b141a;
            position: absolute;
            left: 100%;
            top: 0;
            transition: left 0.3s ease-in-out;
            z-index: 3;
        }

        @media (min-width: 900px) {
            .main-chat {
                position: static;
                flex: 1;
                left: auto;
            }
        }

        .app-container.show-chat .sidebar {
            transform: translateX(-100%);
        }

        .app-container.show-chat .main-chat {
            left: 0;
        }

        .chat-header {
            padding: 15px 20px;
            background: #202c33;
            color: #e9edef;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            border-bottom: 1px solid #222e35;
            height: 65px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #00a884;
            font-size: 22px;
            cursor: pointer;
            display: block;
            padding-right: 10px;
        }

        @media (min-width: 900px) {
            .back-btn {
                display: none;
            }
        }

        .clear-btn {
            background: none;
            border: none;
            color: #8696a0;
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }

            .clear-btn:hover {
                background: rgba(234, 0, 56, 0.1);
                color: #ea0038;
            }

        /* --- MESAJ SAHƏSİ VƏ DESEN (PATTERN) --- */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Müasir riyazi nöqtəli arxa fon deseni */
            background-color: #0b141a;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

            /* Skrol barın fərdiləşdirilməsi */
            .messages-area::-webkit-scrollbar, .chat-list::-webkit-scrollbar {
                width: 6px;
            }

            .messages-area::-webkit-scrollbar-thumb, .chat-list::-webkit-scrollbar-thumb {
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 4px;
            }

        /* --- MESAJ BALONLARI --- */
        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 70%;
            font-size: 14.5px;
            line-height: 1.5;
            word-wrap: break-word;
            color: #e9edef;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            position: relative;
        }

            .msg strong {
                color: #00a884;
                font-size: 12.5px;
                display: block;
                margin-bottom: 3px;
            }

            .msg.sent {
                background: #005c4b; /* WhatsApp Dark Yaşılı */
                align-self: flex-end;
                border-top-right-radius: 2px;
            }

                .msg.sent strong {
                    color: #25d366; /* Göndərən özüdürsə fərqli rəng tonu */
                }

            .msg.received {
                background: #202c33; /* WhatsApp Dark Boz-Mavi */
                align-self: flex-start;
                border-top-left-radius: 2px;
            }

        /* --- INPUT SAHƏSİ --- */
        .input-area {
            padding: 12px 20px;
            background: #202c33;
            display: flex;
            gap: 12px;
            align-items: center;
            height: 70px;
            flex-shrink: 0;
            border-top: 1px solid #222e35;
        }

            .input-area input {
                flex: 1;
                padding: 12px 16px;
                border: none;
                border-radius: 8px;
                outline: none;
                font-size: 15px;
                background: #2a3942;
                color: #e9edef;
                transition: background 0.2s;
            }

                .input-area input::placeholder {
                    color: #8696a0;
                }

                .input-area input:focus {
                    background: #32444f;
                }

            .input-area button {
                padding: 12px 22px;
                background: #00a884;
                color: #111b21;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                font-size: 15px;
                transition: background 0.2s, transform 0.1s;
            }

                .input-area button:hover {
                    background: #006651;
                    color: white;
                }

                .input-area button:active {
                    transform: scale(0.98);
                }

        /* --- AUTH OVERLAY (GİRİŞ) --- */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .auth-box {
            background: #222e35;
            padding: 40px 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            color: #e9edef;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

            .auth-box h2 {
                font-weight: 500;
                letter-spacing: 0.5px;
            }

            .auth-box input {
                padding: 14px;
                border: none;
                border-radius: 8px;
                background: #2a3942;
                color: white;
                outline: none;
                font-size: 15px;
                border: 1px solid transparent;
                transition: 0.2s;
            }

                .auth-box input:focus {
                    border-color: #00a884;
                }

            .auth-box button {
                padding: 14px;
                background: #00a884;
                color: #111b21;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
                font-size: 15px;
                transition: background 0.2s;
            }

                .auth-box button:hover {
                    background: #00c298;
                }
    </style>
</head>
<body>

    <!-- Giriş Bölməsi -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2>Chat Giriş</h2>
            <p style="font-size: 13px; color: #8696a0;">Ad və Giriş Kodu (Şifrə) təyin edin</p>
            <input type="text" id="usernameInput" placeholder="İstifadəçi adı...">
            <input type="password" id="passwordInput" placeholder="Giriş Kodu (Şifrə)...">
            <button onclick="loginOrRegister()">Daxil Ol</button>
        </div>
    </div>

    <!-- Əsas İnterfeys -->
    <div class="app-container" id="appMain" style="display: none;">
        <!-- Sol Tərəf: Siyahı -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span id="myProfileHeader">Çatlar</span>
                <button class="logout-btn" onclick="logout()">Çıxış ↩</button>
            </div>
            <div class="chat-list" id="activeChatsList">
                <div class="chat-item" onclick="switchToGlobalRoom()">
                    <div class="avatar" style="background: #007bff;">G</div>
                    <div><b>Ümumi Otaq</b></div>
                    <span class="unread-badge" id="badge-global">0</span>
                </div>
            </div>
        </div>

        <!-- Sağ Tərəf: Mesajlaşma -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="document.getElementById('appMain').classList.remove('show-chat')">⬅</button>
                    <span id="currentChatTitle">Ümumi Otaq</span>
                </div>
                <button class="clear-btn" onclick="clearChatHistory()">Təmizlə 🗑️</button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Mesaj yazın..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Göndər</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://realtimechatapp-production-1e1f.up.railway.app";
        let connection = null;
        let currentUser = null;
        let activeRoomId = "global";

        async function loginOrRegister() {
            const username = document.getElementById("usernameInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            if (!username || !password) return alert("Bütün xanaları doldurun!");

            try {
                const res = await fetch(`${BASE_URL}/api/users/login-or-register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (!res.ok) return alert("Xəta: " + await res.text());

                currentUser = await res.json();

                document.getElementById("authOverlay").style.display = "none";
                document.getElementById("appMain").style.display = "flex";
                document.getElementById("myProfileHeader").innerText = currentUser.username;

                initSignalR();
                loadUsersList();
                loadChatHistory("global");
            } catch (e) {
                alert("Server bağlantı xətası!");
            }
        }

        async function loadUsersList() {
            try {
                const res = await fetch(`${BASE_URL}/api/users/all`);
                const users = await res.json();
                const listHtml = document.getElementById("activeChatsList");

                listHtml.innerHTML = `
                            <div class="chat-item" onclick="switchToGlobalRoom()">
                                <div class="avatar" style="background: #007bff;">G</div>
                                <div><b>Ümumi Otaq</b></div>
                                <span class="unread-badge" id="badge-global">0</span>
                            </div>`;

                users.forEach(user => {
                    if (user.id !== currentUser.id) {
                        listHtml.innerHTML += `
                                    <div class="chat-item" id="chat-item-${user.id}" onclick="startPrivateChat('${user.id}', '${user.username}')">
                                        <div class="avatar">${user.username[0].toUpperCase()}</div>
                                        <div><b>${user.username}</b></div>
                                        <span class="unread-badge" id="badge-${user.id}">0</span>
                                    </div>`;
                    }
                });
            } catch (err) {
                console.error("İstifadəçi siyahısı yüklənmədi:", err);
            }
        }

        function startPrivateChat(targetUserId, targetUsername) {
            const myId = Number(currentUser.id);
            const theirId = Number(targetUserId);

            activeRoomId = myId < theirId ? `${myId}_${theirId}` : `${theirId}_${myId}`;

            document.getElementById("currentChatTitle").innerText = targetUsername;
            document.getElementById("messagesArea").innerHTML = "";

            const badge = document.getElementById(`badge-${targetUserId}`);
            if (badge) {
                badge.innerText = "0";
                badge.style.display = "none";
            }

            loadChatHistory(activeRoomId);

            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                connection.invoke("JoinRoom", activeRoomId);
            }

            document.getElementById("appMain").classList.add("show-chat");
        }

        function switchToGlobalRoom() {
            activeRoomId = "global";
            document.getElementById("currentChatTitle").innerText = "Ümumi Otaq";
            document.getElementById("messagesArea").innerHTML = "";

            const badge = document.getElementById("badge-global");
            if (badge) {
                badge.innerText = "0";
                badge.style.display = "none";
            }

            loadChatHistory("global");

            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                connection.invoke("JoinRoom", "global");
            }

            document.getElementById("appMain").classList.add("show-chat");
        }

        function initSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl(BASE_URL + "/chatHub")
                .withAutomaticReconnect()
                .build();

            connection.on("ReceivePrivateMessage", function (senderName, message, roomId) {
                if (roomId === activeRoomId) {
                    appendMessage(senderName, message);
                } else {
                    let targetBadgeId = "badge-global";

                    if (roomId !== "global") {
                        const ids = roomId.split("_");
                        const senderId = ids.find(id => Number(id) !== Number(currentUser.id));
                        targetBadgeId = `badge-${senderId}`;
                    }

                    const badge = document.getElementById(targetBadgeId);
                    if (badge) {
                        let count = parseInt(badge.innerText) || 0;
                        count++;
                        badge.innerText = count;
                        badge.style.display = "block";
                    }
                }
            });

            connection.on("ChatHistoryCleared", function (roomId) {
                if (roomId === activeRoomId) {
                    document.getElementById("messagesArea").innerHTML = "";
                }
            });

            connection.on("UserStatusChanged", function () {
                console.log("Sistemdə dəyişiklik aşkarlandı, siyahı yenilənir...");
                loadUsersList();
            });

            connection.start().then(() => {
                connection.invoke("JoinRoom", activeRoomId);
                connection.invoke("RegisterConnection", Number(currentUser.id));
            });
        }

        async function loadChatHistory(roomId) {
            try {
                const res = await fetch(`${BASE_URL}/api/users/messages/${roomId}`);
                if (!res.ok) return;
                const messages = await res.json();
                document.getElementById("messagesArea").innerHTML = "";
                messages.forEach(msg => appendMessage(msg.senderUsername, msg.content));
            } catch (error) {
                console.error("Tarixçə yüklənərkən xəta:", error);
            }
        }

        function appendMessage(sender, text) {
            const area = document.getElementById("messagesArea");
            const div = document.createElement("div");
            div.className = "msg " + (sender === currentUser.username ? "sent" : "received");
            div.innerHTML = `<strong>${sender}</strong>${text}`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text || !connection) return;

            try {
                await connection.invoke("SendPrivateMessage", activeRoomId, Number(currentUser.id), text);
                input.value = "";
                input.focus();
            } catch (e) {
                console.error("Mesaj göndərilərkən xəta:", e);
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        async function clearChatHistory() {
            if (!confirm("Bu otaqdakı bütün mesajları silmək istədiyinizə əminsiniz?")) return;

            try {
                const res = await fetch(`${BASE_URL}/api/users/messages/clear/${activeRoomId}`, {
                    method: "DELETE"
                });

                if (res.ok) {
                    document.getElementById("messagesArea").innerHTML = "";
                    alert("Çat tarixçəsi uğurla silindi!");
                } else {
                    alert("Silinmə zamanı xəta baş verdi.");
                }
            } catch (e) {
                console.error("Silmə xətası:", e);
            }
        }

        function logout() {
            if (connection) {
                connection.stop();
            }
            currentUser = null;
            activeRoomId = "global";
            document.getElementById("usernameInput").value = "";
            document.getElementById("passwordInput").value = "";
            document.getElementById("messagesArea").innerHTML = "";

            document.getElementById("appMain").classList.remove("show-chat");
            document.getElementById("appMain").style.display = "none";
            document.getElementById("authOverlay").style.display = "flex";
        }
    </script>
</body>
</html>
